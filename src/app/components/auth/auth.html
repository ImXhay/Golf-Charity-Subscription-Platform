<div style="padding: 40px; background: #121212; color: #ffffff; border-radius: 12px; max-width: 400px; margin: 50px auto; font-family: sans-serif; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
  <h2 style="color: #00ffcc; text-align: center;">
    {{ isLoginMode ? 'Welcome Back' : 'Join the Impact' }}
  </h2>
  <p style="color: #aaaaaa; text-align: center; margin-bottom: 30px;">
    {{ isLoginMode ? 'Log in to track your scores.' : 'Play golf. Support charities. Win big.' }}
  </p>

  <div style="display: flex; flex-direction: column; gap: 15px;">
    <input type="email" #emailInput placeholder="Email Address" 
           style="padding: 12px; border-radius: 6px; border: 1px solid #333; background: #222; color: white;">
    
    <input type="password" #passInput placeholder="Password" 
           style="padding: 12px; border-radius: 6px; border: 1px solid #333; background: #222; color: white;">

    <select [hidden]="isLoginMode" #charityInput 
            style="padding: 12px; border-radius: 6px; border: 1px solid #333; background: #222; color: white;">
      <option value="">-- Select a Charity to Support --</option>
      <option *ngFor="let charity of charities" [value]="charity.id">
        {{ charity.name }}
      </option>
    </select>

    <button (click)="submitAuth(emailInput.value, passInput.value, charityInput.value)" 
            [disabled]="isLoading"
            style="padding: 14px; background: #00ffcc; color: #000; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px;">
      {{ isLoading ? 'Loading...' : (isLoginMode ? 'Log In' : 'Subscribe & Join') }}
    </button>
  </div>

  <p *ngIf="errorMessage" style="color: #ff5252; text-align: center; margin-top: 15px; font-size: 14px;">
    ⚠ {{ errorMessage }}
  </p>

  <div style="text-align: center; margin-top: 25px;">
    <button (click)="toggleMode()" style="background: none; border: none; color: #aaaaaa; cursor: pointer; text-decoration: underline;">
      {{ isLoginMode ? "Don't have an account? Sign up" : "Already have an account? Log in" }}
    </button>
  </div>
</div>
